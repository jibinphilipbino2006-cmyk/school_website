<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Login</title>

    <!-- Bootstrap -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- Bootstrap Icons -->

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >

    <style>

        body{
            background:
            linear-gradient(
                rgba(0,0,0,0.6),
                rgba(0,0,0,0.6)
            ),
            url('https://images.unsplash.com/photo-1509062522246-3755977927d7');

            background-size:cover;
            background-position:center;
            height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            font-family:'Segoe UI', sans-serif;
        }

        .login-card{
            width:400px;
            border:none;
            border-radius:20px;
            background:white;
        }

        .login-title{
            font-weight:700;
            color:#0d1b2a;
        }

        .form-control{
            height:50px;
            border-radius:10px;
        }

        .login-btn{
            height:50px;
            border-radius:10px;
            font-weight:600;
        }

        .back-btn{
            text-decoration:none;
            color:#0d1b2a;
            font-weight:500;
        }

        .icon-box{
            width:80px;
            height:80px;
            background:#0d1b2a;
            color:white;
            border-radius:50%;

            display:flex;
            justify-content:center;
            align-items:center;

            margin:auto;
            margin-top:-60px;
            font-size:35px;
        }

    </style>

</head>

<body>

<div class="card shadow-lg p-4 login-card">

    <!-- Icon -->

    <div class="icon-box shadow">

        <i class="bi bi-person-lock"></i>

    </div>

    <!-- Heading -->

    <div class="text-center mt-3 mb-4">

        <h2 class="login-title">
            Admin Login
        </h2>

        <p class="text-muted">
            Enter username and password
        </p>

    </div>

    <!-- Error Message -->

    {% if error %}

    <div class="alert alert-danger">

        {{ error }}

    </div>

    {% endif %}

    <!-- Login Form -->

    <form method="POST">

        {% csrf_token %}

        <!-- Username -->

        <div class="mb-3">

            <label class="form-label fw-semibold">
                Username
            </label>

            <input
                type="text"
                name="username"
                class="form-control"
                placeholder="Enter username"
                required
            >

        </div>

        <!-- Password -->

<div class="mb-4">

    <label class="form-label fw-semibold">
        Password
    </label>

    <div class="input-group">

        <input
            type="password"
            name="password"
            id="password"
            class="form-control"
            placeholder="Enter password"
            required
        >

        <!-- Show / Hide Button -->

        <button
            type="button"
            class="btn btn-outline-secondary"
            onclick="togglePassword()"
        >

            <i
                class="bi bi-eye"
                id="toggleIcon"
            ></i>

        </button>

    </div>

</div>
        <!-- Login Button -->

        <button
            type="submit"
            class="btn btn-dark w-100 login-btn"
        >
            Login
        </button>

    </form>

    <!-- Back -->

    <div class="text-center mt-4">

        <a href="/" class="back-btn">

            ← Back to Home

        </a>

    </div>

</div>

<!-- Bootstrap JS -->

<script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>
<script>

function togglePassword(){

    let passwordField =
        document.getElementById("password");

    let icon =
        document.getElementById("toggleIcon");

    if(passwordField.type === "password"){

        passwordField.type = "text";

        icon.classList.remove("bi-eye");

        icon.classList.add("bi-eye-slash");

    }

    else{

        passwordField.type = "password";

        icon.classList.remove("bi-eye-slash");

        icon.classList.add("bi-eye");

    }

}

</script>
</body>

</html>
